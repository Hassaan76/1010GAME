    1 name: "Build Android APK"
    2 "on":
    3   push:
    4     branches:
    5       - main
    6       - master
    7   workflow_dispatch: {}
    8
    9 jobs:
   10   build:
   11     runs-on: ubuntu-latest
   12     steps:
   13       - name: Checkout Source
   14         uses: actions/checkout@v4
   15
   16       - name: Setup Node.js
   17         uses: actions/setup-node@v4
   18         with:
   19           node-version: 20
   20
   21       - name: Install Dependencies
   22         run: npm install
   23
   24       - name: Sync Capacitor
   25         run: npx cap sync android
   26
   27       - name: Setup Java
   28         uses: actions/setup-java@v4
   29         with:
   30           distribution: 'temurin'
   31           java-version: '17'
   32
   33       - name: Build with Gradle
   34         run: |
   35           cd android
   36           chmod +x gradlew
   37           ./gradlew assembleDebug
   38
   39       - name: Upload APK
   40         uses: actions/upload-artifact@v4
   41         with:
   42           name: 1010Game-Debug-APK
   43           path: android/app/build/outputs/apk/debug/app-debug.apk
