    1 name: Build Android APK
    2
    3 on:
    4   push:
    5     branches: [ main, master ]
    6   workflow_dispatch:
    7
    8 jobs:
    9   build:
   10     runs-on: ubuntu-latest
   11     steps:
   12       - name: Checkout Source
   13         uses: actions/checkout@v4
   14
   15       - name: Setup Node.js
   16         uses: actions/setup-node@v4
   17         with:
   18           node-version: 20
   19           cache: 'npm'
   20
   21       - name: Install Dependencies
   22         run: npm install
   23
   24       - name: Sync Capacitor
   25         run: npx cap sync android
   26
   27       - name: Setup Java
   28         uses: actions/setup-java@v4
   29         with:
   30           distribution: 'temurin'
   31           java-version: '17'
   32
   33       - name: Build with Gradle
   34         run: |
   35           cd android
   36           chmod +x gradlew
   37           ./gradlew assembleDebug
   38
   39       - name: Upload APK
   40         uses: actions/upload-artifact@v4
   41         with:
   42           name: 1010Game-Debug-APK
   43           path: android/app/build/outputs/apk/debug/app-debug.apk
